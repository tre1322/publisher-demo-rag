<!doctype html>
<!--
  Popular Network — Marketing Agent dashboard demo
  ================================================
  WHAT THIS IS
    A static, self-contained sample of what a Tier 2 / Tier 3 small business
    owner sees when they log into the Popular Network Marketing Agent. Built
    as a partner demo to communicate product vision. No backend, no APIs —
    every value on screen is mock data hardcoded below.

  HOW TO OPEN
    Double-click this file. It opens in any modern browser. No build, no
    install. React 18, Tailwind, and Lucide are loaded via CDN.

  THE FICTIONAL BUSINESS
    Westbrook Auto & Tire — Westbrook, Minnesota
    Owner: Dale Henderson, Tier 2, day 47 with Popular Network.

  EIGHT VIEWS
    1. Home / Overview
    2. Content Calendar
    3. Approvals Queue
    4. Performance
    5. Reviews
    6. Marketing Plan
    7. AI Agent Chat
    8. Settings
-->

  <!-- Bootstrap: ONE auth-gated fetch before React mounts. The shell GET
       already passed require_auth, so the cookie is valid; this guards
       the mid-session-expiry case (AuthRequired -> 303 -> login HTML,
       which fetch silently follows as 200). Plain JS, no template tags,
       so it sits safely outside the Jinja raw region below. -->
  <script>
    window.__AMPLAFAI_READY__ = fetch('/business/api/bootstrap', { credentials: 'same-origin' })
      .then(function (r) {
        var ct = r.headers.get('content-type') || '';
        if (r.redirected || !r.ok || ct.indexOf('application/json') === -1) {
          window.location.href = '/business/login';
          return new Promise(function () {});
        }
        return r.json();
      })
      .then(function (data) { window.__AMPLAFAI__ = data; return data; })
      .catch(function () {
        window.location.href = '/business/login';
        return new Promise(function () {});
      });
  </script>

  let BOOT = null;   // full bootstrap payload

  function _initials(name) {
    return (name || '').split(/\s+/).filter(Boolean).slice(0, 2)
      .map(function (w) { return w[0].toUpperCase(); }).join('') || '—';
  }

  // Mutate the mock consts in place so existing components that reference
  // `business.*` directly render real data with zero rewrites.
  function hydrate(boot) {
    if (!boot) return;
    BOOT = boot;
    PMC = boot.pmc || PMC;
    const o = boot.org || {};
    const u = boot.user || {};
    if (o.name) business.name = o.name;
    if (u.name) { business.owner = u.name; business.ownerInitials = _initials(u.name); }
    if (o.publisher) business.publisher = o.publisher;
    if (o.phone) business.phone = o.phone;
    const sub = boot.billing && boot.billing.subscription;
    if (sub && sub.tier) {
      business.tierLabel = sub.tier;
      business.tier = sub.tier;
    }
  }

  // Render PMC markdown safely (marked -> DOMPurify). Self-XSS guard:
  // the owner edits + views only their own org's PMC, but sanitize anyway.
  function mdHtml(md) {
    const raw = window.marked ? window.marked.parse(md || '') : (md || '');
    return window.DOMPurify ? window.DOMPurify.sanitize(raw) : raw;
  }

  // fetch wrapper for write calls. If the session expired mid-use the
  // server 303s to /login; fetch follows it and resolves 200-HTML, so
  // detect that and hard-redirect instead of failing silently (R6).
  async function apiFetch(url, opts) {
    const res = await fetch(url, Object.assign({ credentials: 'same-origin' }, opts || {}));
    const ct = res.headers.get('content-type') || '';
    if (res.redirected || ct.indexOf('application/json') === -1) {
      window.location.href = '/business/login';
      return new Promise(function () {});

  const LineChart = ({ current, prev, width = 640, height = 200, padding = 28 }) => {
    const max = Math.max(...current, ...prev) * 1.10;
    const w = width - padding * 2, h = height - padding * 2;
    const stepX = (i, n) => padding + (i / (n - 1)) * w;
    const stepY = (v) => padding + h - (v / max) * h;
    const path = (arr) => arr.map((v, i) => `${i === 0 ? 'M' : 'L'} ${stepX(i, arr.length).toFixed(1)} ${stepY(v).toFixed(1)}`).join(' ');
    const fill = (arr) => path(arr) + ` L ${stepX(arr.length - 1, arr.length).toFixed(1)} ${padding + h} L ${stepX(0, arr.length).toFixed(1)} ${padding + h} Z`;
    return (
      <svg width="100%" viewBox={`0 0 ${width} ${height}`} className="overflow-visible">
        {/* gridlines */}
        {[0.25, 0.5, 0.75, 1].map((t, i) => (
          <line key={i} x1={padding} y1={padding + h - t * h} x2={padding + w} y2={padding + h - t * h}

        {/* prev (under) */}
        <path d={fill(prev)} fill="rgba(139, 156, 160, 0.10)" />
        <path d={path(prev)} fill="none" stroke="#8B9CA0" strokeWidth="1.5" strokeDasharray="4 3" />
        {/* current */}

  const StackedBars = ({ data, width = 640, height = 220, padding = 32 }) => {

        ))}
        {data.map((d, i) => {
          const x = padding + i * groupW + (groupW - barW) / 2;
          const totalH = ((d.organic + d.paid) / max) * h;
          const orgH = (d.organic / max) * h;

  const PieChart = ({ slices, size = 200 }) => {
    const total = slices.reduce((s, x) => s + x.pct, 0);
    const cx = size / 2, cy = size / 2, r = size / 2 - 4, rInner = r * 0.55;
    let angle = -Math.PI / 2;
    const arc = (start, end, rOuter, rInner) => {
      const x1 = cx + rOuter * Math.cos(start), y1 = cy + rOuter * Math.sin(start);
      const x2 = cx + rOuter * Math.cos(end),   y2 = cy + rOuter * Math.sin(end);
      const x3 = cx + rInner * Math.cos(end),   y3 = cy + rInner * Math.sin(end);
      const x4 = cx + rInner * Math.cos(start), y4 = cy + rInner * Math.sin(start);
      const large = end - start > Math.PI ? 1 : 0;
      return `M ${x1} ${y1} A ${rOuter} ${rOuter} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rInner} ${rInner} 0 ${large} 0 ${x4} ${y4} Z`;
    };
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        {slices.map((s, i) => {
          const sweep = (s.pct / total) * Math.PI * 2;
          const start = angle, end = angle + sweep;
          angle = end;
          return <path key={i} d={arc(start, end, r, rInner)} fill={s.color} />;
        })}
      </svg>
    );

  /* ============================================================
     PMC PARSER + PRETTY RENDER
     The PMC is a markdown blob with a fixed shape: an H1, then a
     "## STRATEGIC SUMMARY" block of `- **FIELD:** value` bullets
     (14 known fields), then one "## section" per interview topic.
     parsePmc() turns that into structured data so PmcDoc can render
     the same polished card layout the mockup uses.
     ============================================================ */
  function parsePmc(md) {
    const lines = String(md || '').split('\n');
    const summary = {};
    const sections = [];
    let inSummary = false, curKey = null, cur = null;
    for (let i = 0; i < lines.length; i++) {
      const ln = lines[i];
      const h2 = ln.match(/^##\s+(.+?)\s*$/);
      if (h2) {
        const title = h2[1].trim();
        if (/^strategic summary$/i.test(title)) { inSummary = true; curKey = null; cur = null; }
        else { inSummary = false; curKey = null; cur = { title: title, raw: [] }; sections.push(cur); }
        continue;
      }
      if (/^#\s+/.test(ln)) continue;            // skip H1
      if (inSummary) {
        const b = ln.match(/^[-*]\s+\*\*(.+?):\*\*\s*(.*)$/);
        if (b) { curKey = b[1].trim(); summary[curKey] = b[2].trim(); }
        else if (curKey && ln.trim()) { summary[curKey] += ' ' + ln.trim(); }
        continue;
      }
      if (cur) cur.raw.push(ln);
    }
    sections.forEach(s => { s.body = s.raw.join('\n').trim(); delete s.raw; });
    return { summary, sections };
  }

  const _needsReview = v => /\[NEEDS REVIEW\]/i.test(v || '');
  const _humanize = k => k.replace(/[_-]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    const flag = _needsReview(value);

          {flag && <Pill color="amber" icon="alert">Needs review</Pill>}
        </div>
        <div className={`text-ink leading-relaxed ${big ? 'text-base' : 'text-sm'}`}>
          {value ? value : <span className="text-ink-faint italic">Not provided</span>}
        </div>
      </div>
    );
  };

              </Card>
            </div>
          )}

          {tab === 'notifications' && (
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-5 fade-in">
              <Card>
                <SectionHeader title="Approval cadence" subtitle="How often the agent asks for your sign-off." />
                <div className="space-y-2">
                  {cadenceOptions.map(opt => (
                    <button key={opt.id} onClick={() => setCadence(opt.id)}
                      className={`w-full text-left p-3 rounded-lg border-2 transition-all ${cadence === opt.id ? 'border-brand-500 bg-brand-50' : 'border-surface-edge hover:border-ink-faint/30'}`}>
                      <div className="flex items-start gap-3">
                        <div className={`w-4 h-4 rounded-full border-2 mt-0.5 shrink-0 ${cadence === opt.id ? 'border-brand-500 bg-white' : 'border-surface-edge'}`}>
                          {cadence === opt.id && <div className="w-2 h-2 rounded-full bg-brand-500 m-0.5"></div>}
                        </div>
                        <div className="flex-1">
                          <div className="font-medium text-ink text-sm">{opt.label}</div>
                          <div className="text-xs text-ink-soft mt-0.5">{opt.hint}</div>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </Card>
              <Card>
                <SectionHeader title="When to ping you" subtitle="Pick the moments worth interrupting your day." />
                <ul className="space-y-3">
                  {[
                    { label: 'New negative review (2★ or below)',  on: true,  via: 'Email + push' },
                    { label: 'Posts approaching scheduled time',   on: true,  via: 'Email digest' },
                    { label: 'Ad spend pacing alerts',             on: true,  via: 'Email' },
                    { label: 'Weekly performance digest',          on: true,  via: 'Email · Mondays 8am' },
                    { label: 'Knowledge-gap detector findings',    on: false, via: '—' },
                    { label: 'Competitive intel digest (Tier 3)',  on: false, via: 'Tier 3 only', muted: true }
                  ].map((n, i) => (
                    <li key={i} className={`flex items-center justify-between p-3 rounded-lg border ${n.muted ? 'border-surface-edge bg-surface opacity-60' : 'border-surface-edge bg-white'}`}>
                      <div>
                        <div className={`text-sm font-medium ${n.muted ? 'text-ink-faint' : 'text-ink'}`}>{n.label}</div>
                        <div className="text-xs text-ink-faint">{n.via}</div>
                      </div>
                      <div className={`w-9 h-5 rounded-full transition-all ${n.on ? 'bg-brand-500' : 'bg-surface-edge'} relative`}>
                        <div className={`absolute top-0.5 w-4 h-4 rounded-full bg-white shadow-sm transition-all ${n.on ? 'left-[18px]' : 'left-0.5'}`}></div>
                      </div>
                    </li>
                  ))}
                </ul>
              </Card>
              <Card className="lg:col-span-2 bg-gradient-to-r from-accent/15 to-brand-50">
                <div className="flex items-center justify-between gap-6">
                  <div>
                    <div className="font-semibold text-ink text-base">Need a real person?</div>
                    <p className="text-sm text-ink-soft mt-0.5">
                      We get back to every owner within one business day. Your direct line is your publisher rep at {business.publisher}, with the Popular Network team copied.
                    </p>
                  </div>
                  <Button icon="phone" variant="primary" onClick={onTalkToHuman}>Talk to a human</Button>
                </div>
              </Card>
            </div>
          )}
        </div>
      </div>
    );
  };

  /* ============================================================
     APP SHELL
     ============================================================ */
  const ROADMAP_VIEWS = new Set(['home','compose','calendar','approvals','performance','reviews','chat']);

  const RoadmapBanner = () => (
    <div className="bg-amber-50 border-b border-amber-200 px-8 py-2.5 text-[13px] text-amber-900 flex items-center gap-2">
      <Icon name="sparkles" size={14} strokeWidth={2.2} />
      <span>
        <span className="font-semibold">Roadmap preview</span> — this section is
        illustrative and not wired to your live data yet. Marketing Profile,
        Marketing Plan, and Settings are live.
      </span>
    </div>
  );

  function _initialView() {
    try {
      const q = new URLSearchParams(window.location.search).get('view');
      if (q) return q;
    } catch (e) { /* no-op */ }
    return (PMC && PMC.state !== 'accepted') ? 'profile' : 'home';
  }

  const App = () => {
    const [view, setView] = useState(_initialView);
    const [humanOpen, setHumanOpen] = useState(false);

    return (
      <div className="flex h-screen w-full bg-surface">
        <Sidebar current={view} onNavigate={setView} />
        <main className="flex-1 overflow-y-auto">
          {ROADMAP_VIEWS.has(view) && <RoadmapBanner />}
          {view === 'home'        && <HomeView onNavigate={setView} />}
          {view === 'compose'     && <ComposeView />}
          {view === 'calendar'    && <CalendarView onNavigate={setView} />}
          {view === 'approvals'   && <ApprovalsView />}
          {view === 'performance' && <PerformanceView />}
          {view === 'reviews'     && <ReviewsView />}
          {view === 'profile'     && <MarketingProfileView onNavigate={setView} />}
          {view === 'plan'        && <MarketingPlanView onNavigate={setView} />}
          {view === 'chat'        && <ChatView />}
          {view === 'settings'    && <SettingsView onTalkToHuman={() => setHumanOpen(true)} />}
        </main>

        <Modal open={humanOpen} onClose={() => setHumanOpen(false)} title="Talk to a human"
          footer={<>
            <Button variant="ghost" onClick={() => setHumanOpen(false)}>Cancel</Button>
            <Button icon="check" onClick={() => setHumanOpen(false)}>Send</Button>
          </>}>
          <p className="text-sm text-ink-soft">
            We'll get back to you within one business day. Your message goes to your publisher rep at the <span className="font-medium text-ink">{business.publisher}</span> and the Popular Network team.
          </p>
          <div className="mt-4 space-y-3">
            <div>
              <label className="text-xs uppercase tracking-wider font-medium text-ink-faint">From</label>
              <div className="mt-1 px-3 py-2 rounded-lg border border-surface-edge bg-surface text-sm">{business.owner} · {business.name}</div>
            </div>
            <div>
              <label className="text-xs uppercase tracking-wider font-medium text-ink-faint">What's on your mind?</label>
              <textarea className="mt-1 w-full px-3 py-2 rounded-lg border border-surface-edge text-[15px] focus:outline-none focus:border-brand-500" rows="4"
                placeholder="Tell us what you need help with…"></textarea>
            </div>
            <div className="text-xs text-ink-faint flex items-start gap-2">
              <Icon name="phone" size={12} className="mt-0.5 shrink-0" />
              <span>Or call us at <span className="font-medium text-ink">(507) 555-0100</span> Mon–Fri 8am–5pm Central.</span>
            </div>
          </div>
        </Modal>
      </div>
    );
  };

  // Mount only after the bootstrap payload has resolved (or the loader
  // has already redirected to /login). By render time window.__AMPLAFAI__
  // is populated, so the useState initializer + hydrate() see real data.
  (window.__AMPLAFAI_READY__ || Promise.resolve(null)).then(function () {
    hydrate(window.__AMPLAFAI__);
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  });
{% endraw %}
  </script>
</body>
</html>
