<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Main Street OS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0/dist/css/tabler.min.css">
</head>
<body class="d-flex flex-column bg-white">
    <div class="page page-center">
        <div class="container container-tight py-4">
            <div class="text-center mb-4">
                <h2>Main Street OS</h2>
                <p class="text-muted">Sign in to manage your business</p>
            </div>
            <div class="card card-md">
                <div class="card-body">
                    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                    <form action="/business/login" method="post" autocomplete="off">
                        <div class="mb-3">
                            <label class="form-label">Email address</label>
                            <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" required>
                        </div>
                        <div class="form-footer">
                            <button type="submit" class="btn btn-primary w-100">Sign in</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="text-center text-muted mt-3">
                <small>Have an invite link? <a href="#" onclick="alert('Paste your invite link in the browser address bar.');return false;">Open it</a> to register.</small>
            </div>
        </div>
    </div>
</body>
</html>
