# Amplafai production stack — DigitalOcean Droplet.
#
#   web    : FastAPI app (business + /admin), SQLite on a named volume
#   voice  : LiveKit voice-interview worker (same image, different cmd)
#   caddy  : reverse proxy + automatic Let's Encrypt TLS for the domain
#
# Secrets come from a local `.env` file next to this one (NOT committed).
# Put amplafai-railway-env.txt on the droplet as `.env` here.
#
# Bring up:   docker compose up -d --build
# Update:     git pull && docker compose up -d --build   (volume persists)
services:
  web:
    build: .
    image: amplafai:latest
    env_file: .env
    environment:
      - PORT=8080
    volumes:
      - amplafai-data:/app/data
    expose:
      - "8080"
    restart: unless-stopped

  voice:
    image: amplafai:latest
    depends_on:
      - web
    env_file: .env
    environment:
      # Post the finished transcript to the web service over the private
      # compose network — no public hairpin, and it keeps working even
      # if DNS/TLS is mid-change. HMAC signing is host-agnostic.
      - PMC_VOICE_CALLBACK_BASE_URL=http://web:8080
    command: ["uv", "run", "--no-dev", "python", "-m", "src.modules.pmc.voice_agent", "start"]
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  amplafai-data:   # SQLite (orgs/invites/billing/PMC) — survives redeploys
  caddy-data:      # TLS certs — persist so renewals don't hit LE limits
  caddy-config:
